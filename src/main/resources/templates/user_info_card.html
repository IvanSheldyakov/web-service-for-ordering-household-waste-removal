<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Информационная карточка</title>
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header('Информационная карточка')}"></div>
<main class="app-shell">
    <section class="card motivation-zone">
        <h2 th:text="${infoCard.title}">Название карточки</h2>
        <p th:text="${infoCard.description}">Описание карточки</p>
    </section>

    <section class="card">
        <nav class="link-row">
            <a th:href="@{/user/{userId}/home(userId=${userId})}">Вернуться на главную</a>
        </nav>
    </section>
</main>
</body>
</html>
