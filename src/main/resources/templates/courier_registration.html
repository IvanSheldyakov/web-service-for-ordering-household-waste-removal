<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация курьера</title>
    <link rel="stylesheet" th:href="@{/css/registration.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header('Регистрация курьера')}"></div>
<main class="app-shell">
    <section class="card">
        <h2>Регистрация курьера</h2>
        <p class="hint">Укажите район работы (по почтовому индексу) и часовой пояс.</p>

        <form th:action="@{/courier/registration}" th:object="${courierRegistrationForm}" method="post">
            <div class="form-grid">
                <label>Телефон*
                    <input type="text" th:field="*{phone}" placeholder="79001234567">
                    <span class="error" th:errors="*{phone}"></span>
                </label>

                <label>Электронная почта*
                    <input type="email" th:field="*{email}" placeholder="courier@example.com">
                    <span class="error" th:errors="*{email}"></span>
                </label>

                <label>Пароль*
                    <input type="password" th:field="*{password}" placeholder="Минимум 6 символов">
                    <span class="error" th:errors="*{password}"></span>
                </label>

                <label>Имя*
                    <input type="text" th:field="*{name}">
                    <span class="error" th:errors="*{name}"></span>
                </label>

                <label>Фамилия*
                    <input type="text" th:field="*{surname}">
                    <span class="error" th:errors="*{surname}"></span>
                </label>

                <label>Отчество (необязательно)
                    <input type="text" th:field="*{patronymic}">
                    <span class="error" th:errors="*{patronymic}"></span>
                </label>

                <label>Почтовый индекс района*
                    <input type="text" th:field="*{postalCode}">
                    <span class="error" th:errors="*{postalCode}"></span>
                </label>

                <label>Часовой пояс*
                    <select th:field="*{timezone}" required>
                        <option value="" disabled
                                th:selected="${courierRegistrationForm.timezone == null || #strings.isEmpty(courierRegistrationForm.timezone)}">
                            Выберите часовой пояс
                        </option>
                        <option th:each="tz : ${timezones}" th:value="${tz.id}" th:text="${tz.title}"></option>
                    </select>
                    <span class="error" th:errors="*{timezone}"></span>
                </label>
            </div>
            <button type="submit">Зарегистрироваться</button>
        </form>
    </section>
</main>
</body>
</html>
